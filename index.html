<!DOCTYPE html>
<html>
<head>
    <title>Crochet World</title>

    <style>
        body{
            background-color:#ffe6f2;
            font-family:Verdana;
            margin:0;
        }

        .header{
            background-color:#ff66b2;
            color:white;
            text-align:center;
            padding:20px;
        }

        .content{
            text-align:center;
            padding:30px;
        }

        img{
            width:250px;
            border-radius:10px;
        }

        .btn{
            background-color:#ff66b2;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
        }

        .footer{
            background-color:#ff99cc;
            text-align:center;
            padding:15px;
            margin-top:20px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🧶 Crochet World</h1>
        <p>Learn Crochet Step by Step</p>
    </div>

    <div class="content">
        <img src="crochet.jpg" alt="Crochet">

        <h2>Welcome!</h2>

        <p>
            Crochet is a fun and creative hobby.
            You can make flowers, bags, keychains,
            toys and many beautiful handmade items.
        </p>

        <button class="btn">Join Now</button>
    </div>

    <div class="footer">
        Made with 💖 for Crochet Lovers
    </div>

</body>
</html>
